<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Indie Flower', cursive;
            perspective: 1000px;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .compliment {
            position: absolute;
            color: #ffcc00;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.8), 0 0 5px rgba(255, 255, 255, 0.5);
            font-weight: bold;
            opacity: 0;
            transform-origin: center;
            animation: slowZoom 8s ease-out forwards;
        }

        @keyframes slowZoom {
            0% {
                transform: translate(-50%, -50%) translateZ(-1200px) scale(0.1);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) translateZ(500px) scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        
        const compliments = [
            "Você é linda", "Minha princesa", "Maravilhosa", "Perfeita", 
            "Incrível", "Inteligente", "Radiante", "Dona do meu amor", 
            "Cheirosa", "Meu porto seguro", "Gatinha", "Especial",
            "Dona do meu sorriso", "Encantadora", "Preciosa",
            "Minha vida", "Deusa", "Fascinante", "Doce", "Única"
        ];

        function drawStaticStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          
            for (let i = 0; i < 400; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 1.5;
                const opacity = Math.random() * 0.8 + 0.2;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                if (Math.random() > 0.95) {
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "white";
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        function spawnCompliment() {
            const text = compliments[Math.floor(Math.random() * compliments.length)];
            const div = document.createElement('div');
            div.className = 'compliment';
            div.innerText = text;
            
            const x = Math.random() * 100; 
            const y = Math.random() * 100;
            
            div.style.left = `${x}%`;
            div.style.top = `${y}%`;
            
            div.style.fontSize = (Math.random() * 10 + 22) + 'px';
            
            document.body.appendChild(div);

            setTimeout(() => {
                div.remove();
            }, 8000);
        }

        window.addEventListener('resize', drawStaticStars);
        
        drawStaticStars();
        
        setInterval(spawnCompliment, 1500);

    </script>
</body>
</html>
